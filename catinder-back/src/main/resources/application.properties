# Configuration de la base de données H2 (pour dev)
spring.datasource.url=jdbc:h2:mem:catinderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Affichage SQL pour debug
spring.jpa.show-sql=true

# Configuration du port
server.port=8080

# Clé secrète JWT (à changer en prod !)
catinder.jwt.secret=ChangeMeSuperSecretKey

# Autoriser le front Angular (CORS)
spring.web.cors.allowed-origins=http://localhost:4200
