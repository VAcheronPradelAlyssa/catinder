<section class="auth-shell" aria-labelledby="login-title">
	<div class="auth-card">
		<div class="auth-brand">
			<img src="assets/logo.png" alt="Logo Catinder" class="auth-logo" />
			<p class="eyebrow">Catinder</p>
			<h2 id="login-title">Connexion</h2>
			<p class="subtitle">Retrouve ton tableau de chats à swiper en une minute.</p>
		</div>

		<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
			<label>
				<span>Email</span>
				<input type="email" formControlName="email" autocomplete="email" placeholder="chat@catinder.io" />
			</label>
			<p class="field-error" *ngFor="let error of emailErrors()">{{ error }}</p>

			<label>
				<span>Mot de passe</span>
				<input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
			</label>
			<p class="field-error" *ngFor="let error of passwordErrors()">{{ error }}</p>

			<label class="checkbox-row">
				<input type="checkbox" formControlName="rememberMe" />
				<span>Rester connecté sur cet appareil</span>
			</label>

			<p class="server-error" *ngIf="serverError()">{{ serverError() }}</p>

			<button type="submit" class="primary-button" [disabled]="isSubmitting()">
				<span *ngIf="!isSubmitting()">Se connecter</span>
				<span *ngIf="isSubmitting()">Connexion en cours...</span>
			</button>

			<p class="helper-text">
				Pas encore de compte ? <a routerLink="/register">Créer un compte</a>
			</p>
		</form>
	</div>
</section>
